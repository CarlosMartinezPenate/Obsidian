name: Publish HarrisLab Protocols

on:
  push:
    branches:
      - main
    paths:
      - "HarrisLab/Protocols/**"
      - ".github/workflows/publish-protocols.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site folder
        run: |
          mkdir site
          cp -r HarrisLab/Protocols/* site/

          if [ ! -f site/index.md ] && [ ! -f site/index.html ]; then
            echo "# Harris Lab Protocols" > site/index.md
            echo "" >> site/index.md
            echo "## Protocol files" >> site/index.md
            echo "" >> site/index.md
            find site -maxdepth 2 -type f \( -name "*.md" -o -name "*.html" \) \
              | sed 's#site/##' \
              | sort \
              | awk '{print "- [" $0 "](" $0 ")"}' >> site/index.md
          fi

          cat > site/_config.yml <<'EOF'
          title: Harris Lab Protocols
          theme: minima
          markdown: kramdown
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
